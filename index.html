<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dhananjay's System</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0F172A" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const root = document.getElementById('root');
          if (root && root.innerHTML === '') {
            root.innerHTML = '<div style="background:#0F172A;color:#6366F1;height:100vh;display:flex;align-items:center;justify-content:center;font-weight:900;letter-spacing:0.5em;">ORIN LINKAGE TIMEOUT</div>';
          }
        }, 3000);
      });
    </script>
  </body>
</html>
